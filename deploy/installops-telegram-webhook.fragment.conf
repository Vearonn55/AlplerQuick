# Paste this block INSIDE the existing HTTPS server { ... } for kurulum.alplerltd.com
# in /etc/nginx/sites-available/installops-frontend.conf
# Place it next to your other location blocks (e.g. after /api/, before the closing }).
#
# Requires: docker-compose ports "127.0.0.1:8081:8080" and BOT_MODE=webhook in .env

    # ===== Telegram bot webhook (AlplerQuick on Docker host port 8081) =====
    location /telegram/webhook {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
